record:
  repo_id: &repo_id "test/test"
  # Suggested format: <hf_username>/<description>, description = task.description -> Verb_SourceObject_prep_TargetObject
  # e.g. Pick up the green cube and put it into the trash bin -> pick_greencube_into_trashbin
  debug: 0 # if True, robot will not execute any actions, but gripper can still be controlled
  user_notes:  # any additional notes about the dataset
  fps: 30 # dataset and camera frame rate
  control_mode: &control_mode "oculus"  # teleoperation control mode (only "oculus" supported)
  use_gripper: &use_gripper true  # whether to use gripper
  run_mode: "run_record" # "run_record" or "run_policy" or "run_mix"

  # Robot type selection. Supported robots: dobot_dual_arm, franka_dual_arm, nero_dual_arm, arx_dual_arm, franka
  robot_type: &robot_type "arx_dual_arm"

  teleop:
    control_mode: *control_mode
    dual_arm: true  # dual-arm mode
    oculus_config:
      ip: "192.168.110.62"  # Oculus Quest IP address
      use_gripper: *use_gripper
      # --- ARX R5 scalers/signs ---
      left_pose_scaler: [2.5, 2.5]   # left arm scaler [position, orientation]
      left_channel_signs: [1, 1, 1, -1, -1, 1]  # left arm signs [x,y,z,rx,ry,rz]
      right_pose_scaler: [2.5, 2.5]  # right arm scaler [position, orientation]
      right_channel_signs: [1, 1, 1, -1, -1, 1]  # right arm signs [x,y,z,rx,ry,rz]
      # --- Nero scalers/signs (uncomment when robot_type: "nero_dual_arm") ---
      # left_pose_scaler: [0.3, 0.3]
      # left_channel_signs: [-1, -1, 1, 1, 1, 1]
      # right_pose_scaler: [0.3, 0.3]
      # right_channel_signs: [-1, -1, 1, 1, 1, 1]
      visualize_placo: false  # whether to visualize robot using placo

  robot:
    # --- Dobot config (use when robot_type: "dobot_dual_arm") ---
    # robot_ip: &ip "192.168.110.41"
    # robot_port: 4242
    # use_gripper: *use_gripper
    # gripper_ip: "192.168.110.15"
    # gripper_port: 4243
    # close_threshold: 0.05
    # gripper_reverse: false
    # gripper_max_open: 0.1
    # gripper_force: 2.0

    # --- Nero config (use when robot_type: "nero_dual_arm") ---
    # robot_ip: &ip "localhost"
    # robot_port: 4242
    # use_gripper: *use_gripper
    # close_threshold: 0.7
    # gripper_bin_threshold: 0.98
    # gripper_reverse: false
    # gripper_max_open: 0.085

    # --- ARX R5 config (use when robot_type: "arx_dual_arm") ---
    robot_ip: &ip "10.10.10.2"  # ARX RPC server IP (robot-side Linux)
    robot_port: 4242            # ZMQ+msgpack RPC port
    use_gripper: true
    gripper_reverse: false      # ARX integrated gripper, 0=open 1=closed
    close_threshold: 0.5
    enable_ee_action_filter: true     # 对 Oculus delta ee_pose 开启低通滤波 (EMA)
    ee_action_filter_alpha_pos: 0.4   # 位置通道 alpha, 越小越平滑
    ee_action_filter_alpha_rot: 0.35  # 姿态通道 alpha, 越小越平滑
    enable_ee_action_deadband: true   # delta ee_pose 死区: 待机微抖不下发
    ee_action_deadband_pos_norm: 0.00005  # 位置模长阈值 (m)
    ee_action_deadband_rot_norm: 0.0005   # 姿态模长阈值 (rad)
    # Note: gripper_ip/port/max_open/force/speed are ignored for ARX (gripper is integrated)

  policy:
    type: "act"  # 策略类型 (act, diffusion)
    device: "cuda"  # 运行设备 (cuda, cpu)
    push_to_hub: False  # 禁用模型推送
    pretrained_path: "/home/deepcybo/lerobot/franka_workspace/outputs/train/act_test9/checkpoints/last/pretrained_model"  # 预训练模型路径下要包括config.json

  task:
    description: "use the left hand to pick up the bottle and insert it into the blender then pressing the button" # task description
    num_episodes: 10 # number of episodes to record
    display: True # Whether to display the data during recording
    resume: false # whether to resume from an existing dataset
    resume_dataset: roboticiq/pick_all_yellow_cube_to_brown_basket_20260208_v01 # dataset to resume from if resume is True
  
  time:
    episode_time_sec: 6000 # max time per episode in seconds
    reset_time_sec: 6000 # max time to reset between episodes in seconds
    save_meta_period: 1 # Save metadata after every N episodes

  cameras:
    # --- Dobot serials (use when robot_type: "dobot_dual_arm") ---
    # left_wrist_cam_serial: "317422075656"
    # right_wrist_cam_serial: "344322074412"
    # head_cam_serial: "243322071821"

    # --- Nero serials (use when robot_type: "nero_dual_arm") ---
    # left_wrist_cam_serial: "412622270929"
    # right_wrist_cam_serial: "412622270701"
    # head_cam_serial: "339322074423"

    # --- ARX R5 serials (use when robot_type: "arx_dual_arm") ---
    left_wrist_cam_serial: "218622274803"   # left wrist camera serial number
    right_wrist_cam_serial: "218622278394"  # right wrist camera serial number
    head_cam_serial: "218622271302"         # head (overhead) camera serial number
    width: 424 # 640 424
    height: 240 # 360 240

  storage:
    push_to_hub: False # whether to push the dataset to your huggingface repo after recording

replay:
  dataset_name: dual_dobot/milk_shake_3_15_step1_20260315_v08
  episode_idx: 0 # episode index to replay
  robot_type: *robot_type  # robot type to use for replay
  robot:
    ip: *ip
    robot_port: 4242  # dual-arm zerorpc port
  control_mode: *control_mode 

visualize:
  dataset_name: dual_dobot/milk_shake_3_15_step1_20260315_v08
  episode_index: 0 # episode index to visualize


